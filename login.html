<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | ChronoX Horology</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { primary: '#c0a068', secondary: '#1a1a1a', accent: '#d4af37' }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/png" href="images/logo.png">
</head>
<body class="dark transition-colors duration-300">


    <div class="min-h-screen flex flex-col items-center justify-center pt-24 md:pt-0 bg-white dark:bg-[#080808] transition-colors duration-300 p-8">
        <div class="w-full max-w-md fade-in bg-white dark:bg-secondary/30 border border-black/5 dark:border-white/10 p-8 md:p-16 shadow-2xl rounded-sm">
            <a href="index.html" class="flex items-center justify-center gap-4 mb-12 hover:scale-105 transition-transform group">
                <img src="images/logo.png" alt="ChronoX Logo" class="h-12 w-auto object-contain">
                <span class="text-2xl font-bold tracking-tighter text-primary">CHRONOX</span>
            </a>
            <h2 class="text-3xl font-bold mb-4 tracking-tight text-secondary dark:text-white text-center">Login</h2>
            <p class="text-[10px] mb-12 tracking-[0.2em] uppercase text-secondary/60 dark:text-white/60 text-center">Enter your credentials below</p>
            
            <form class="space-y-8 text-left">
                <div class="flex flex-col space-y-2">
                    <label class="text-[10px] uppercase tracking-widest font-bold text-secondary dark:text-white/80">Email Address</label>
                    <input type="email" required placeholder="leo@example.com" class="bg-transparent border-b border-secondary/20 dark:border-white/20 py-4 focus:outline-none focus:border-primary transition-all text-secondary dark:text-white placeholder-secondary/30 dark:placeholder-white/30">
                </div>
                <div class="flex flex-col space-y-2">
                    <label class="text-[10px] uppercase tracking-widest font-bold text-secondary dark:text-white/80">Secret Password</label>
                    <input type="password" required placeholder="********" class="bg-transparent border-b border-secondary/20 dark:border-white/20 py-4 focus:outline-none focus:border-primary transition-all text-secondary dark:text-white placeholder-secondary/30 dark:placeholder-white/30">
                </div>
                <div class="flex justify-between items-center text-[10px] uppercase tracking-widest font-bold pt-2 text-secondary/70 dark:text-white/70">
                    <label class="flex items-center cursor-pointer hover:opacity-100 transition-all">
                        <input type="checkbox" class="mr-2"> Remember Me
                    </label>
                    <a href="#" class="hover:text-primary hover:underline transition-all">Forgot Password?</a>
                </div>
                <button type="submit" class="btn-premium bg-primary text-white w-full py-5 font-bold uppercase tracking-[0.3em] text-xs shadow-xl mt-8">Proceed to Hall</button>
                
                <p class="text-[10px] text-center uppercase tracking-widest mt-12 text-secondary/60 dark:text-white/60">New to the family? <a href="signup.html" class="text-primary font-bold ml-2 hover:underline hover:opacity-100 transition-all">Request Membership</a></p>
            </form>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
