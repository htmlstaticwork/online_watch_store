<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | ChronoX Horology</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { primary: '#c0a068', secondary: '#1a1a1a', accent: '#d4af37' }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/png" href="images/logo.png">
</head>
<body class="transition-colors duration-300">
    <div class="fixed top-6 right-6 flex items-center gap-4 z-[100]">
        <button id="rtl-toggle" class="bg-white dark:bg-secondary border border-black/10 dark:border-white/10 h-10 w-10 text-[10px] font-bold uppercase tracking-widest text-secondary dark:text-white hover:border-primary transition-all rounded-full flex items-center justify-center">RTL</button>
        <button id="theme-toggle" class="bg-white dark:bg-secondary border border-black/10 dark:border-white/10 h-10 w-10 text-secondary dark:text-white hover:border-primary transition-all rounded-full flex items-center justify-center"></button>
    </div>


    <div class="min-h-screen py-20 flex flex-col items-center justify-center bg-white dark:bg-[#080808] transition-colors duration-300 px-8">
        <div class="w-full max-w-md fade-in bg-white dark:bg-secondary/30 border border-black/5 dark:border-white/10 p-8 md:p-16 shadow-2xl rounded-sm">
            <a href="index.html" class="flex items-center justify-center gap-4 mb-12 hover:scale-105 transition-transform group">
                <img src="images/logo.png" alt="ChronoX Logo" class="h-12 w-auto object-contain">
                <span class="text-2xl font-bold tracking-tighter text-primary">CHRONOX</span>
            </a>
            <h2 class="text-3xl font-bold mb-4 uppercase tracking-widest text-secondary dark:text-white text-center">Create Membership</h2>
            <p class="text-[10px] mb-12 tracking-[0.2em] uppercase text-secondary/60 dark:text-white/60 text-center">Join our community of collectors</p>
            
            <form class="space-y-8 text-left">
                <div class="grid grid-cols-2 gap-6">
                    <div class="flex flex-col space-y-2">
                        <label class="text-[10px] uppercase tracking-widest font-bold text-secondary dark:text-white/80">First Name</label>
                        <input type="text" required placeholder="" class="bg-transparent border-b border-secondary/20 dark:border-white/20 py-4 focus:outline-none focus:border-primary transition-all text-secondary dark:text-white placeholder-secondary/30 dark:placeholder-white/30">
                    </div>
                    <div class="flex flex-col space-y-2">
                        <label class="text-[10px] uppercase tracking-widest font-bold text-secondary dark:text-white/80">Last Name</label>
                        <input type="text" required placeholder="" class="bg-transparent border-b border-secondary/20 dark:border-white/20 py-4 focus:outline-none focus:border-primary transition-all text-secondary dark:text-white placeholder-secondary/30 dark:placeholder-white/30">
                    </div>
                </div>
                <div class="flex flex-col space-y-2">
                    <label class="text-[10px] uppercase tracking-widest font-bold text-secondary dark:text-white/80">Email Address</label>
                    <input type="email" required placeholder="" class="bg-transparent border-b border-secondary/20 dark:border-white/20 py-4 focus:outline-none focus:border-primary transition-all text-secondary dark:text-white placeholder-secondary/30 dark:placeholder-white/30">
                </div>
                <div class="flex flex-col space-y-2">
                    <label class="text-[10px] uppercase tracking-widest font-bold text-secondary dark:text-white/80">New Password</label>
                    <input type="password" required placeholder="" class="bg-transparent border-b border-secondary/20 dark:border-white/20 py-4 focus:outline-none focus:border-primary transition-all text-secondary dark:text-white placeholder-secondary/30 dark:placeholder-white/30">
                </div>
                <div class="flex flex-col space-y-2">
                    <label class="text-[10px] uppercase tracking-widest font-bold text-secondary dark:text-white/80">Confirm Password</label>
                    <input type="password" required placeholder="" class="bg-transparent border-b border-secondary/20 dark:border-white/20 py-4 focus:outline-none focus:border-primary transition-all text-secondary dark:text-white placeholder-secondary/30 dark:placeholder-white/30">
                </div>
                <div class="flex items-center text-[10px] uppercase tracking-widest font-bold pt-4 text-secondary/70 dark:text-white/70">
                    <label class="flex items-center cursor-pointer hover:opacity-100 transition-all">
                        <input type="checkbox" required class="mr-2"> I agree to the <a href="#" class="text-primary font-bold ml-1 hover:underline transition-all">Terms of Service</a>
                    </label>
                </div>
                <button type="submit" class="btn-premium bg-primary text-white w-full py-5 font-bold uppercase tracking-[0.3em] text-xs shadow-xl mt-8">Apply for Membership</button>
                
                <p class="text-[10px] text-center uppercase tracking-widest mt-12 text-secondary/60 dark:text-white/60">Existing Collector? <a href="login.html" class="text-primary font-bold ml-2 hover:underline hover:opacity-100 transition-all">Login Here</a></p>

                <div class="flex justify-center space-x-6 mt-12 pt-8 border-t border-black/5 dark:border-white/10">
                    <a href="#" class="p-3 bg-black/5 dark:bg-white/5 rounded-full hover:bg-accent hover:text-white hover:scale-125 hover:shadow-2xl hover:shadow-accent/30 transition-all duration-300 text-secondary dark:text-white">
                        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
                    </a>
                    <a href="#" class="p-3 bg-black/5 dark:bg-white/5 rounded-full hover:bg-accent hover:text-white hover:scale-125 hover:shadow-2xl hover:shadow-accent/30 transition-all duration-300 text-secondary dark:text-white">
                        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>
                    </a>
                    <a href="#" class="p-3 bg-black/5 dark:bg-white/5 rounded-full hover:bg-accent hover:text-white hover:scale-125 hover:shadow-2xl hover:shadow-accent/30 transition-all duration-300 text-secondary dark:text-white">
                        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.377.505 9.377.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
                    </a>
                </div>


            </form>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
